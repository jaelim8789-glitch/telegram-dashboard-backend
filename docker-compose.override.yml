services:
  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://telegram_dashboard:telegram_dashboard@backend-db-1:5432/telegram_dashboard
    networks:
      - backend_default
      - default

  frontend:
    networks:
      - default

  nginx:
    image: nginx:alpine
    environment:
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .template
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /tmp/telegram-dashboard-backend/nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:80
      - 443:443
    networks:
      - default

networks:
  backend_default:
    external: true
