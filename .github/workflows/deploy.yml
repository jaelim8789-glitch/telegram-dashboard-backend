name: Deploy TeleMon Backend

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/telemon-backend

jobs:
  # ═══════════════════════════════════════════
  # 1. Backend CI — import check + migrations + tests
  # ═══════════════════════════════════════════
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telegram_dashboard
          POSTGRES_PASSWORD: telegram_dashboard
          POSTGRES_DB: telegram_dashboard
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "**/requirements*.txt"

      - run: |
          pip install uv
          uv pip install --system -r requirements.txt
        name: Install Python deps (uv)

      - run: alembic upgrade head
        name: Apply migrations (CI validation)
        env:
          DATABASE_URL: postgresql+asyncpg://telegram_dashboard:telegram_dashboard@localhost:5432/telegram_dashboard
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'ci-test-encryption-key-not-for-prod-32b' }}

      - run: python -c "import sys; sys.path.insert(0, '.'); from app.main import app; print('import OK')"
        name: Import check
        env:
          DATABASE_URL: postgresql+asyncpg://telegram_dashboard:telegram_dashboard@localhost:5432/telegram_dashboard
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'ci-test-encryption-key-not-for-prod-32b' }}

      - run: python -m pytest tests/ -q --tb=short --timeout=30 2>&1 | tail -60
        name: Run tests
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://telegram_dashboard:telegram_dashboard@localhost:5432/telegram_dashboard
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'ci-test-encryption-key-not-for-prod-32b' }}

  # ═══════════════════════════════════════════
  # 2. Backend Docker build & push (GHCR)
  # ═══════════════════════════════════════════
  backend-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: telegram-dashboard-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ═══════════════════════════════════════════
  # 3b. Deploy to production (manual — pull only)
  # ═══════════════════════════════════════════
  deploy-production:
    needs: [backend-docker]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pre-deploy gateway health check
        id: gateway-precheck
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 6); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Gateway healthy"
                exit 0
              fi
              sleep 3
            done
            echo "❌ Gateway unhealthy — aborting deploy"
            exit 1

      - name: Deploy production via SSH (pull-only, verify digest, wait)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            PREV_IMAGE=$(docker compose images --quiet backend)
            docker compose pull --pull=always backend -q
            NEW_IMAGE=$(docker compose images --quiet backend)
            if [ "$PREV_IMAGE" = "$NEW_IMAGE" ]; then
              echo "⚠️ Backend image unchanged — verifying digest"
              docker inspect --format='{{.RepoDigests}}' ghcr.io/${{ github.repository_owner }}/telemon-backend:latest || true
            fi
            docker compose up -d --no-deps --wait backend
            echo "✅ [production] backend deployed"
            docker compose restart nginx || true

      - name: Smoke test (production)
        id: smoke-test-prod
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Health OK"
                curl -sf http://localhost:8000/ | grep -q '"status"' && echo "✅ Root API OK"
                echo "✅ Smoke test passed"
                exit 0
              fi
              sleep 5
            done
            echo "❌ Smoke test failed — previous image still running"
            exit 1

      - name: Notify production deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [production] Backend deployed — Rollback: docker compose pull backend:prev && docker compose up -d backend","username":"TeleMon CI","icon_emoji":":robot:"}
          preventFailureOnNoResponse: true
