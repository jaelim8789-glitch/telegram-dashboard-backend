# docker-compose.override.yml — local / staging overrides
# Usage:
#   docker compose --profile full up -d     # production (from docker-compose.yml)
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d  # with overrides
#
# Set UVICORN_WORKERS=1 for single-worker dev, or leave default 2 for staging-like.
services:
  backend:
    environment:
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
