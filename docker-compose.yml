# ─── TeleMon Production Stack ────────────────────────────────────────
# Profiles:  docker compose --profile frontend-only up -d
#            docker compose --profile backend-only up -d
#            docker compose --profile full up -d         (default)
#
# Profile-free services (db, db-backup) always start.
services:
  # --- Database (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: telegram_dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram_dashboard_password}
      POSTGRES_DB: telegram_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER:-telemon}/telemon-backend:${TAG:-latest}
    build: .
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles:
      - backend-only
      - full
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://telegram_dashboard:telegram_dashboard@db:5432/telegram_dashboard
    volumes:
      - media_data:/app/media
      - bot_data:/app/data

  frontend:
    image: ghcr.io/${GHCR_OWNER:-telemon}/telemon-frontend:${TAG:-latest}
    build:
      context: ../telegram-dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
        NEXT_PUBLIC_SITE_URL: "https://telemon.online"
        NEXT_PUBLIC_APP_URL: "https://app.telemon.online"
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: "telemon_verify_bot"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    profiles:
      - frontend-only
      - full

  nginx:
    build: ./nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    profiles:
      - frontend-only
      - backend-only
      - full

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: |
      sh -c '
        echo "0 3 * * * /usr/local/bin/backup.sh" > /etc/crontabs/root
        crond -f -l 2
      '
    volumes:
      - /backups/telemon:/backups
      - ./scripts/db_backup_container.sh:/usr/local/bin/backup.sh:ro
    environment:
      PGUSER: telegram_dashboard
      PGPASSWORD: ${POSTGRES_PASSWORD:-telegram_dashboard_password}
      PGHOST: db
      PGDATABASE: telegram_dashboard
      BACKUP_DIR: /backups
      RETENTION_DAYS: 7
    depends_on:
      db:
        condition: service_healthy

  # ─── Redis (caching + task queue) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  media_data:
  bot_data:
  redis_data:

networks:
  internal:
    driver: bridge
    internal: true
